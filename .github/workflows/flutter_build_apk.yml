name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID'
        required: true
      zip_path:
        description: 'Path ke file zip di repo'
        required: false
      zip_url:
        description: 'URL file zip'
        required: false

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # STEP 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
      
      # STEP 2: Setup Flutter dengan versi stabil
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'  # Versi stabil terbaru
          channel: 'stable'
          cache: true
      
      # STEP 3: Verifikasi Flutter
      - name: Verifikasi Flutter
        run: |
          flutter --version
          flutter doctor -v
      
      # STEP 4: Download ZIP file
      - name: Download ZIP file
        id: download
        run: |
          # Buat folder temp
          mkdir -p temp
          cd temp
          
          # Download berdasarkan input
          if [[ -n "${{ github.event.inputs.zip_url }}" ]]; then
            echo "📥 Downloading from URL: ${{ github.event.inputs.zip_url }}"
            wget -O project.zip "${{ github.event.inputs.zip_url }}" || {
              echo "❌ Gagal download dari URL"
              exit 1
            }
          elif [[ -n "${{ github.event.inputs.zip_path }}" ]]; then
            echo "📂 Copy from path: ${{ github.event.inputs.zip_path }}"
            if [[ -f "${{ github.event.inputs.zip_path }}" ]]; then
              cp "${{ github.event.inputs.zip_path }}" project.zip
            else
              echo "❌ File tidak ditemukan: ${{ github.event.inputs.zip_path }}"
              exit 1
            fi
          else
            echo "❌ Tidak ada source ZIP"
            exit 1
          fi
          
          # Cek ukuran file
          echo "📊 Ukuran file:"
          ls -lh project.zip
          
          # Verifikasi file ZIP
          file project.zip
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File ZIP corrupt!"
            exit 1
          fi
          echo "✅ File ZIP valid"
          
          echo "zip_file=$PWD/project.zip" >> $GITHUB_OUTPUT
      
      # STEP 5: Extract dan analisa struktur ZIP
      - name: Extract dan Analisa Project
        run: |
          mkdir -p project_source
          cd project_source
          
          echo "📦 Extracting ZIP..."
          unzip -q "${{ steps.download.outputs.zip_file }}"
          
          echo "📁 Struktur folder:"
          find . -type f -name "pubspec.yaml" | while read f; do
            echo "  📄 $f"
          done
          
          # Cari pubspec.yaml
          if [[ -f "pubspec.yaml" ]]; then
            echo "✅ pubspec.yaml ditemukan di root"
            mv . ../flutter_project
          elif [[ -d "$(find . -maxdepth 1 -type d | tail -n +2 | head -1)" ]]; then
            # Ada subfolder, pindahkan isinya
            SUBFOLDER=$(find . -maxdepth 1 -type d | tail -n +2 | head -1)
            echo "📁 Project ada di subfolder: $SUBFOLDER"
            mv $SUBFOLDER/* . 2>/dev/null || true
            mv $SUBFOLDER/.* . 2>/dev/null || true
            rmdir $SUBFOLDER 2>/dev/null || true
            
            if [[ -f "pubspec.yaml" ]]; then
              echo "✅ pubspec.yaml ditemukan setelah dipindah"
              mv . ../flutter_project
            else
              echo "❌ pubspec.yaml tetap tidak ditemukan!"
              find . -type f -name "pubspec.yaml" -exec dirname {} \;
              exit 1
            fi
          else
            echo "❌ pubspec.yaml tidak ditemukan!"
            echo "Isi folder:"
            ls -la
            exit 1
          fi
      
      # STEP 6: Setup Android SDK
      - name: Setup Android SDK
        run: |
          # Accept licenses
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          
          # Setup local.properties
          cd flutter_project
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
      
      # STEP 7: Clean dan Get Packages
      - name: Clean dan Get Packages
        run: |
          cd flutter_project
          echo "🧹 Cleaning project..."
          flutter clean
          
          echo "📦 Getting packages..."
          flutter pub get
          
          # Cek hasil pub get
          if [ $? -eq 0 ]; then
            echo "✅ Packages berhasil diinstall"
          else
            echo "❌ Gagal install packages"
            exit 1
          fi
      
      # STEP 8: Build APK Release
      - name: Build APK Release
        id: build
        run: |
          cd flutter_project
          echo "🔨 Building APK Release..."
          
          # Build dengan opsi verbose untuk debugging
          flutter build apk --release --verbose
          
          if [ $? -eq 0 ]; then
            echo "✅ Build berhasil!"
            
            # Cari file APK
            APK_PATH=$(find build -name "*.apk" | head -1)
            if [[ -n "$APK_PATH" ]]; then
              echo "📱 APK ditemukan di: $APK_PATH"
              echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
              
              # Info file
              ls -lh "$APK_PATH"
            else
              echo "❌ File APK tidak ditemukan!"
              exit 1
            fi
          else
            echo "❌ Build gagal!"
            exit 1
          fi
      
      # STEP 9: Upload APK ke Artifact
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: apk-${{ github.event.inputs.job_id }}
          path: flutter_project/${{ steps.build.outputs.apk_path }}
          retention-days: 7
          if-no-files-found: error
      
      # STEP 10: Info Build Summary
      - name: Build Summary
        if: always()
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Job ID:** ${{ github.event.inputs.job_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "- **APK Siap diunduh!**" >> $GITHUB_STEP_SUMMARY
          fi
